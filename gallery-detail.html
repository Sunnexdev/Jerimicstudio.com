<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gallery — Jerimic Studio</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="gallery-detail.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="brand">
          <span class="brand-icon" aria-hidden="true">
            <img
              src="Jerimic Transparent Logo 2.png"
              alt="Jerimic Studio Logo"
            />
          </span>
          Jerimic<span>Studio</span>
        </a>
        <nav class="nav-links">
          <a href="/index.html#about">About</a>
          <a href="/index.html#services">Services</a>
          <a href="/index.html#gallery">Gallery</a>
          <a href="/index.html#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container">
          <a
            href="index.html#gallery"
            class="btn btn-light"
            style="margin-bottom: 1rem; display: inline-block"
            >← Back to Gallery</a
          >
          <div
            id="gallery-detail"
            class="hero-card"
            style="padding: 1.2rem; overflow: hidden"
          >
            <div class="gallery-hero">
              <img id="detail-image" src="" alt="" />
              <div class="gallery-hero-copy">
                <h2 id="detail-title">Title</h2>
                <p id="detail-desc" style="color: var(--muted)"></p>
              </div>
            </div>
            <div id="gallery-grid" class="gallery-detail-grid"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>© 2026 Jerimic Studio. Crafted for timeless stories.</p>
      </div>
    </footer>

    <div id="image-lightbox" class="image-lightbox" hidden>
      <button type="button" class="lightbox-close" aria-label="Close image">
        ×
      </button>
      <img id="lightbox-image" src="" alt="Expanded gallery image" />
    </div>

    <script src="gallery-detail.js"></script>
  </body>
</html>
